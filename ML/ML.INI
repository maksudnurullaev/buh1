About as block:uzb:
Бу программа бухгалтерлар учун яратилган!<br />
Программамих хали узгаришлар бор, лекин хозирнинг узида справочник урнида ишлатсангиз булади.

About as block:eng:
This application was created for accountants!<br />
It's still under hard development stage, but you can use as accounting guides for 'Chart of Accounts' and 'Busness transactions'.

About as block:rus:
Данная программа разработана для бухгалтеров!<br />
И на данный момент он работает в тестовом режиме, но вы можете ее использвать как справочник по "Плану счетов" и "Хозяйстенным операциям".

